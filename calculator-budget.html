<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a1a2e">
<title>装修预算计算器</title>
<style>
:root {
  --bg: #0d0d1a; --bg2: #141428; --card: #1a1a30; --cardHover: #222245;
  --text: #e8e8f0; --text2: #9999b0; --muted: #666680;
  --accent: #6c5ce7; --accent2: #a29bfe; --green: #00b894; --red: #e74c3c;
  --border: #2a2a45; --radius: 10px; --r2: 6px;
  --font: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font); background: var(--bg); color: var(--text); line-height: 1.5; -webkit-tap-highlight-color: transparent; }
.app { max-width: 800px; margin: 0 auto; min-height: 100dvh; display: flex; flex-direction: column; }

/* Header */
.header { display: flex; align-items: center; gap: 10px; padding: 14px 16px; background: linear-gradient(180deg, var(--bg2), var(--bg)); position: sticky; top: 0; z-index: 10; }
.header .back { width: 32px; height: 32px; border: none; border-radius: 50%; background: transparent; color: var(--text2); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; }
.header .back:active { background: rgba(255,255,255,0.1); color: #fff; }
.header h1 { font-size: 18px; font-weight: 700; background: linear-gradient(135deg, var(--accent2), #fd79a8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }

/* Tabs */
.tabs { display: flex; gap: 4px; padding: 0 12px 8px; overflow-x: auto; scrollbar-width: none; }
.tabs::-webkit-scrollbar { display: none; }
.tab { padding: 8px 14px; border: 1px solid var(--border); border-radius: 20px; background: var(--card); color: var(--text2); font-size: 13px; cursor: pointer; white-space: nowrap; font-family: var(--font); transition: all 0.15s; }
.tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }

/* Content */
.content { flex: 1; padding: 0 12px 100px; overflow-y: auto; }

/* Room Header */
.room-header { padding: 14px 16px; margin: 8px 0; background: linear-gradient(135deg, var(--accent), #4834d4); border-radius: var(--radius); color: #fff; }
.room-header h3 { font-size: 15px; margin-bottom: 4px; }
.room-header .hint { font-size: 11px; opacity: 0.8; }
.room-header .area-input { margin-top: 8px; display: flex; align-items: center; gap: 8px; }
.room-header .area-input label { font-size: 12px; opacity: 0.9; white-space: nowrap; }
.room-header .area-input input { width: 70px; padding: 6px 10px; border: none; border-radius: var(--r2); background: rgba(255,255,255,0.2); color: #fff; font-size: 15px; text-align: center; font-family: var(--font); outline: none; }
.room-header .area-input input::placeholder { color: rgba(255,255,255,0.5); }
.room-header .area-summary { font-size: 13px; margin-top: 6px; }

/* Item Row */
.item-row { display: flex; align-items: center; gap: 8px; padding: 10px 12px; margin: 2px 0; background: var(--card); border: 1px solid var(--border); border-radius: var(--r2); transition: background 0.15s; }
.item-row:hover { background: var(--cardHover); }
.item-row .seq { font-size: 11px; color: var(--muted); width: 20px; flex-shrink: 0; }
.item-row .name { flex: 1; font-size: 13px; min-width: 0; }
.item-row .name small { display: block; font-size: 10px; color: var(--muted); margin-top: 1px; }
.item-row .field { display: flex; flex-direction: column; align-items: center; gap: 2px; flex-shrink: 0; }
.item-row .field label { font-size: 9px; color: var(--muted); }
.item-row .field input { width: 56px; padding: 5px; border: 1px solid var(--border); border-radius: var(--r2); background: #0d0d1a; color: var(--text); font-size: 13px; text-align: center; font-family: var(--font); outline: none; transition: border-color 0.15s; }
.item-row .field input:focus { border-color: var(--accent); }
.item-row .field .unit-price { font-size: 11px; color: var(--text2); }
.item-row .subtotal { font-size: 14px; font-weight: 600; color: var(--accent2); min-width: 64px; text-align: right; flex-shrink: 0; }
.item-row .subtotal.zero { color: var(--muted); font-weight: 400; }

/* Bottom Bar */
.bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; max-width: 800px; margin: 0 auto; padding: 12px 16px; background: rgba(20,20,40,0.97); backdrop-filter: blur(12px); border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; z-index: 20; }
.bottom-bar .total-label { font-size: 13px; color: var(--text2); }
.bottom-bar .total-amount { font-size: 22px; font-weight: 700; background: linear-gradient(135deg, #00b894, #00cec9); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.bottom-bar .total-amount.zero { background: none; -webkit-text-fill-color: var(--muted); }
.bottom-bar .actions { display: flex; gap: 8px; }
.bottom-bar button { padding: 8px 16px; border: 1px solid var(--border); border-radius: 20px; font-size: 13px; cursor: pointer; font-family: var(--font); transition: all 0.15s; }
.btn-reset { background: transparent; color: var(--text2); }
.btn-reset:active { background: rgba(255,255,255,0.05); }
.btn-save { background: var(--accent); color: #fff; border-color: var(--accent); }
.btn-save:active { opacity: 0.8; }

/* Section Title */
.section-title { font-size: 13px; font-weight: 600; color: var(--accent2); padding: 12px 4px 4px; margin-top: 8px; border-bottom: 1px solid var(--border); margin-bottom: 4px; }

.empty-hint { text-align: center; padding: 24px; color: var(--muted); font-size: 13px; }

@media (max-width: 480px) {
  .item-row { padding: 8px; gap: 4px; }
  .item-row .name { font-size: 12px; }
  .item-row .field input { width: 48px; font-size: 12px; padding: 4px; }
  .item-row .subtotal { font-size: 13px; min-width: 52px; }
}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <button class="back" onclick="history.back()">&larr;</button>
    <h1>装修预算计算器</h1>
  </div>

  <div class="tabs">
    <button class="tab active" data-tab="construction">基础施工</button>
    <button class="tab" data-tab="materials">主材</button>
    <button class="tab" data-tab="appliances">家电设备</button>
    <button class="tab" data-tab="other">其他费用</button>
  </div>

  <div class="content" id="content"></div>

  <div class="bottom-bar">
    <div>
      <div class="total-label">预估总价</div>
      <div class="total-amount zero" id="grandTotal">¥0</div>
    </div>
    <div class="actions">
      <button class="btn-reset" id="btnReset">清空</button>
    </div>
  </div>
</div>

<script>
(function() {

  var STORAGE_KEY = 'zx_budget_calc';

  // ===== 数据定义 (来自模板) =====

      {name:'墙地面防水', unit:'m²', price:124},
      {name:'轻体砖围砌管道', unit:'米', price:158},
      {name:'管道降噪防潮', unit:'米', price:54},
      {name:'过门石安装', unit:'块', price:50},
    ]},
    balcony: { name: '阳台', items: [
      {name:'薄贴墙砖(400×800)', unit:'m²', price:125},
      {name:'薄贴墙砖(600×1200)', unit:'m²', price:155},
      {name:'正铺地砖(750×1500)', unit:'m²', price:175},
      {name:'墙面基层找平', unit:'m²', price:42},
      {name:'墙地面防水', unit:'m²', price:124},
      {name:'轻体砖围砌管道', unit:'米', price:158},
      {name:'管道降噪防潮', unit:'米', price:54},
    ]},
    electricity: { name: '水电项目', items: [
      {name:'水电预收(按面积)', unit:'m²', price:145, hint:'伟星/日丰/金德水管'},
    ]},
  };

  var materialsData = [
    {name:'地板', unit:'m²', price:200},
    {name:'大地砖', unit:'片', price:100},
    {name:'墙砖', unit:'片', price:20},
    {name:'小地砖', unit:'片', price:15},
    {name:'集成吊顶', unit:'m²', price:200},
    {name:'浴霸', unit:'台', price:800},
    {name:'过门石', unit:'m²', price:80},
    {name:'飘窗石', unit:'m²', price:380},
    {name:'窗台石', unit:'m²', price:1000},
    {name:'木门', unit:'樘', price:1800},
    {name:'窗套', unit:'米', price:200},
    {name:'垭口', unit:'米', price:230},
    {name:'橱柜', unit:'米', price:7000},
    {name:'地漏', unit:'个', price:185},
    {name:'开关面板(50个/套)', unit:'套', price:1200},
    {name:'晾衣架', unit:'套', price:1599},
    {name:'卫浴(马桶+花洒+浴室柜)', unit:'套', price:8000, hint:'含主卫一套'},
    {name:'衣柜定制', unit:'m²', price:1500, hint:'按投影面积'},
    {name:'美缝', unit:'m²', price:35},
  ];

  var appliancesData = [
    {name:'烟机灶具', unit:'套', price:6000, room:'厨房'},
    {name:'洗碗机', unit:'台', price:6000, room:'厨房'},
    {name:'冰箱', unit:'台', price:5000, room:'厨房'},
    {name:'管线机', unit:'台', price:2500, room:'厨房'},
    {name:'投影仪', unit:'台', price:5000, room:'客厅'},
    {name:'音响', unit:'套', price:2500, room:'客厅'},
    {name:'洗地机', unit:'台', price:2500, room:'客厅'},
    {name:'电动晾衣架', unit:'套', price:2000, room:'客厅'},
    {name:'灯具(全屋)', unit:'套', price:3000, room:'客厅'},
    {name:'电视', unit:'台', price:12000, room:'客厅'},
    {name:'洗衣机+烘干机', unit:'套', price:15000, room:'卫生间'},
    {name:'电吹风', unit:'个', price:500, room:'卫生间'},
    {name:'浴霸', unit:'台', price:800, room:'卫生间'},
    {name:'电热毛巾架', unit:'个', price:500, room:'卫生间'},
    {name:'热水器', unit:'台', price:3000, room:'卫生间'},
    {name:'新风系统', unit:'套', price:15000, room:'全屋'},
    {name:'中央空调', unit:'套', price:45000, room:'全屋'},
    {name:'前置过滤器', unit:'个', price:800, room:'全屋'},
    {name:'净水设备', unit:'套', price:5000, room:'全屋'},
    {name:'智能门锁', unit:'个', price:2500, room:'全屋'},
  ];

  var otherData = [
    {name:'成品保护', unit:'m²', price:15, hint:'门/窗户/地砖/燃气表'},
    {name:'材料搬运费', unit:'m²', price:10, hint:'每层另加200元'},
    {name:'垃圾清理(三居)', unit:'项', price:460},
    {name:'拆除砖墙体', unit:'m²', price:80, hint:'非承重墙'},
    {name:'新建墙体', unit:'m²', price:210, hint:'红机砖+双面抹灰'},
  ];

  var activeTab = 'construction';
  var dataState = {};

  // ===== Init =====
  function init() {
    loadState();
    bindTabs();
    bindReset();
    renderTab();
    updateTotal();
  }

  function loadState() {
    try {
      var saved = localStorage.getItem(STORAGE_KEY);
      if (saved) dataState = JSON.parse(saved);
    } catch(e) { dataState = {}; }
  }

  function saveState() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(dataState)); } catch(e) {}
  }

  function getQty(key, def) {
    return dataState[key] !== undefined ? dataState[key] : def;
  }

  function setQty(key, val) {
    var n = parseFloat(val);
    if (isNaN(n) || n < 0) n = 0;
    dataState[key] = n;
    saveState();
    updateTotal();
  }

  function calcSubtotal(key, price, qty) {
    var q = getQty(key, qty);
    return q * price;
  }

  function fmtMoney(n) { return '¥' + n.toLocaleString('zh-CN'); }

  function fmti(n) { return n ? n.toLocaleString('zh-CN') : '0'; }

  // ===== Tabs =====
  function bindTabs() {
    document.querySelectorAll('.tab').forEach(function(t) {
      t.addEventListener('click', function() {
        document.querySelectorAll('.tab').forEach(function(x) { x.classList.remove('active'); });
        t.classList.add('active');
        activeTab = t.dataset.tab;
        renderTab();
      });
    });
  }

  function bindReset() {
    document.getElementById('btnReset').addEventListener('click', function() {
      if (confirm('确定要清空所有数据吗？')) {
        dataState = {};
        saveState();
        renderTab();
        updateTotal();
      }
    });
  }

  function renderTab() {
    var container = document.getElementById('content');
    var html = '';

    if (activeTab === 'construction') {
      html = renderConstruction();
    } else if (activeTab === 'materials') {
      html = renderMaterials();
    } else if (activeTab === 'appliances') {
      html = renderAppliances();
    } else if (activeTab === 'other') {
      html = renderOther();
    }

    container.innerHTML = html;
    bindInputs();
  }

  // ===== Render Construction =====
  function renderConstruction() {
    var html = '';
    var roomKeys = Object.keys(constructionData);
    var globalArea = getQty('global_area', 100);

    html += '<div class="room-header">';
    html += '<h3>房屋总面积</h3>';
    html += '<div class="area-input"><label>建筑面积</label><input id="input_global_area" type="number" value="' + fmti(globalArea) + '" min="0" step="1" placeholder="m²"></div>';
    html += '<div class="hint">输入房屋建筑面积后自动估算各房间工程量，也可手动逐项修改</div>';
    html += '</div>';

    roomKeys.forEach(function(rk) {
      var room = constructionData[rk];
      var roomTotal = 0;
      room.items.forEach(function(item, i) {
        var key = 'c_' + rk + '_' + i;
        var qty = getQty(key, 0);
        roomTotal += qty * item.price;
      });

      html += '<div class="room-header" style="background:linear-gradient(135deg,#2d3436,#636e72);margin-top:12px;">';
      html += '<h3>' + room.name + '</h3>';
      html += '<div class="area-summary">小计: ' + fmtMoney(roomTotal) + '</div>';
      html += '</div>';

      room.items.forEach(function(item, i) {
        var key = 'c_' + rk + '_' + i;
        var qty = getQty(key, 0);
        var sub = qty * item.price;
        html += '<div class="item-row">';
        html += '<span class="seq">' + (i + 1) + '</span>';
        html += '<div class="name">' + item.name + (item.hint ? '<small>' + item.hint + '</small>' : '') + '</div>';
        html += '<div class="field"><input data-key="' + key + '" type="number" value="' + fmti(qty) + '" min="0" step="1" placeholder="0" style="width:56px"><span class="unit-price">×' + item.price + '/' + item.unit + '</span></div>';
        html += '<div class="subtotal' + (sub === 0 ? ' zero' : '') + '">' + (sub > 0 ? fmtMoney(sub) : '¥0') + '</div>';
        html += '</div>';
      });
    });

    return html;
  }

  // ===== Render Materials =====
  function renderMaterials() {
    var html = '';
    html += '<div class="room-header"><h3>主材费用</h3><div class="hint">填入所需数量，自动计算金额。单价为市场参考价，可按实际调整。</div></div>';

    materialsData.forEach(function(item, i) {
      var key = 'm_' + i;
      var qty = getQty(key, 0);
      var sub = qty * item.price;
      html += '<div class="item-row">';
      html += '<span class="seq">' + (i + 1) + '</span>';
      html += '<div class="name">' + item.name + '</div>';
      html += '<div class="field"><input data-key="' + key + '" type="number" value="' + fmti(qty) + '" min="0" step="1" placeholder="0"><span class="unit-price">×' + item.price + '/' + item.unit + '</span></div>';
      html += '<div class="subtotal' + (sub === 0 ? ' zero' : '') + '">' + (sub > 0 ? fmtMoney(sub) : '¥0') + '</div>';
      html += '</div>';
    });

    return html;
  }

  // ===== Render Appliances =====
  function renderAppliances() {
    var html = '';
    html += '<div class="room-header"><h3>家电设备</h3><div class="hint">按空间分组，填入数量自动计算。参考价含安装费。</div></div>';

    var currentRoom = '';
    appliancesData.forEach(function(item, i) {
      if (item.room !== currentRoom) {
        currentRoom = item.room;
        html += '<div class="section-title">' + currentRoom + '设备</div>';
      }
      var key = 'a_' + i;
      var qty = getQty(key, 0);
      var sub = qty * item.price;
      html += '<div class="item-row">';
      html += '<span class="seq">' + (i + 1) + '</span>';
      html += '<div class="name">' + item.name + '</div>';
      html += '<div class="field"><input data-key="' + key + '" type="number" value="' + fmti(qty) + '" min="0" step="1" placeholder="0"><span class="unit-price">×' + item.price + '/' + item.unit + '</span></div>';
      html += '<div class="subtotal' + (sub === 0 ? ' zero' : '') + '">' + (sub > 0 ? fmtMoney(sub) : '¥0') + '</div>';
      html += '</div>';
    });

    return html;
  }

  // ===== Render Other =====
  function renderOther() {
    var html = '';
    html += '<div class="room-header"><h3>其他费用</h3><div class="hint">成品保护、材料搬运、垃圾清运、拆改等杂项费用。</div></div>';

    otherData.forEach(function(item, i) {
      var key = 'o_' + i;
      var qty = getQty(key, 0);
      var sub = qty * item.price;
      html += '<div class="item-row">';
      html += '<span class="seq">' + (i + 1) + '</span>';
      html += '<div class="name">' + item.name + (item.hint ? '<small>' + item.hint + '</small>' : '') + '</div>';
      html += '<div class="field"><input data-key="' + key + '" type="number" value="' + fmti(qty) + '" min="0" step="1" placeholder="0"><span class="unit-price">×' + item.price + '/' + item.unit + '</span></div>';
      html += '<div class="subtotal' + (sub === 0 ? ' zero' : '') + '">' + (sub > 0 ? fmtMoney(sub) : '¥0') + '</div>';
      html += '</div>';
    });

    return html;
  }

  // ===== Bind Inputs =====
  function bindInputs() {
    document.querySelectorAll('input[data-key]').forEach(function(inp) {
      inp.addEventListener('input', function() {
        var key = inp.dataset.key;
        setQty(key, inp.value);

        if (key === 'global_area') {
          autoFillConstruction();
        }

        // Update this row's subtotal
        updateRowSubtotal(inp);
        updateTotal();
      });
      inp.addEventListener('focus', function() { inp.select(); });
    });
  }

  function autoFillConstruction() {
    var area = getQty('global_area', 100);
    // 自动估算各区域面积和工程量
    var ratios = {
      living: { area: Math.round(area * 0.35), floor: 1.0, wall: 2.5, plaster: 1.2, tile75: 1.0, curtain: 1, ceiling: 0.6 },
      masterRoom: { area: Math.round(area * 0.18), floor: 1.0, wall: 2.5 },
      room2: { area: Math.round(area * 0.14), floor: 1.0, wall: 2.5 },
      mainBath: { area: 5, floor: 5, wall: 22, pipe: 1, niche: 1, doorStone: 1, waterproofFloor: 5, waterproofWall: 12 },
      subBath: { area: 4, floor: 4, wall: 18, pipe: 1, niche: 0, doorStone: 1, waterproofFloor: 4, waterproofWall: 10 },
      kitchen: { area: 7, floor: 7, wall: 25, pipe: 1, doorStone: 1, waterproofFloor: 7, waterproofWall: 5 },
      balcony: { area: 4, floor: 4, wall: 12, pipe: 0, waterproofFloor: 4, waterproofWall: 5 },
      electricity: { area: area },
    };

    // Auto-fill only if values are currently 0 (don't override manual entries)
    Object.keys(ratios).forEach(function(rk) {
      var r = ratios[rk];
      var items = constructionData[rk].items;
      items.forEach(function(item, i) {
        var key = 'c_' + rk + '_' + i;
        if (getQty(key, 0) === 0) {
          var auto = 0;
          if (item.name.indexOf('拆除地砖') !== -1 || item.name.indexOf('地面找平') !== -1 || item.name.indexOf('自流平') !== -1) auto = Math.round(r.floor || r.area);
          else if (item.name.indexOf('墙皮铲除') !== -1) auto = Math.round(r.wall || (r.area * 2.5));
          else if (item.name.indexOf('正铺地砖') !== -1 || item.name.indexOf('踢脚线') !== -1) auto = Math.round(r.floor || r.area);
          else if (item.name.indexOf('基层找平') !== -1) auto = Math.round(r.wall || (r.area * 2.5));
          else if (item.name.indexOf('腻子') !== -1 || item.name.indexOf('乳胶漆') !== -1) auto = Math.round(r.wall || (r.area * 2.5));
          else if (item.name.indexOf('石膏线') !== -1) auto = Math.round((r.area || 15) * 0.8);
          else if (item.name.indexOf('窗帘盒') !== -1) auto = r.curtain || 0;
          else if (item.name.indexOf('吊顶') !== -1) auto = Math.round(r.ceiling || 0);
          else if (item.name.indexOf('薄贴墙砖') !== -1 && item.name.indexOf('600×1200') !== -1) auto = Math.round(r.wall * 0.4 || 8);
          else if (item.name.indexOf('薄贴墙砖') !== -1) auto = Math.round(r.wall * 0.6 || 14);
          else if (item.name.indexOf('防水') !== -1) auto = Math.round((r.waterproofFloor || 5) + (r.waterproofWall || 10));
          else if (item.name.indexOf('围砌管道') !== -1) auto = r.pipe || 0;
          else if (item.name.indexOf('壁龛') !== -1) auto = r.niche || 0;
          else if (item.name.indexOf('降噪') !== -1) auto = r.pipe ? r.pipe * 3 : 0;
          else if (item.name.indexOf('过门石') !== -1) auto = r.doorStone || 0;
          else if (item.name.indexOf('水电预收') !== -1) auto = r.area || 100;

          if (auto > 0) {
            dataState[key] = auto;
          }
        }
      });
    });
    saveState();
  }

  function updateRowSubtotal(inp) {
    var row = inp.closest('.item-row');
    if (!row) return;
    var key = inp.dataset.key;
    var priceEl = row.querySelector('.unit-price');
    var subEl = row.querySelector('.subtotal');
    if (!priceEl || !subEl) return;
    var priceMatch = priceEl.textContent.match(/×(\d+)/);
    if (!priceMatch) return;
    var price = parseInt(priceMatch[1]);
    var qty = getQty(key, 0);
    var sub = qty * price;
    subEl.textContent = sub > 0 ? fmtMoney(sub) : '¥0';
    subEl.className = 'subtotal' + (sub === 0 ? ' zero' : '');

    // Update room header subtotal
    updateRoomTotals();
  }

  function updateRoomTotals() {
    if (activeTab !== 'construction') return;
    var roomKeys = Object.keys(constructionData);
    document.querySelectorAll('.room-header').forEach(function(header, idx) {
      if (idx === 0) return; // skip global area header
      var ri = idx - 1;
      if (ri >= roomKeys.length) return;
      var rk = roomKeys[ri];
      var items = constructionData[rk].items;
      var total = 0;
      items.forEach(function(item, i) {
        total += getQty('c_' + rk + '_' + i, 0) * item.price;
      });
      var summaryEl = header.querySelector('.area-summary');
      if (summaryEl) summaryEl.textContent = '小计: ' + fmtMoney(total);
    });
  }

  // ===== Total =====
  function updateTotal() {
    var total = 0;

    // Construction
    Object.keys(constructionData).forEach(function(rk) {
      constructionData[rk].items.forEach(function(item, i) {
        total += calcSubtotal('c_' + rk + '_' + i, item.price, 0);
      });
    });

    // Materials
    materialsData.forEach(function(item, i) {
      total += calcSubtotal('m_' + i, item.price, 0);
    });

    // Appliances
    appliancesData.forEach(function(item, i) {
      total += calcSubtotal('a_' + i, item.price, 0);
    });

    // Other
    otherData.forEach(function(item, i) {
      total += calcSubtotal('o_' + i, item.price, 0);
    });

    var el = document.getElementById('grandTotal');
    el.textContent = total > 0 ? fmtMoney(total) : '¥0';
    el.className = 'total-amount' + (total === 0 ? ' zero' : '');
  }

  // ===== Start =====
  init();
})();
</script>
</body>
</html>
