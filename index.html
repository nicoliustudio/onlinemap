<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>装修资料库 - 沉浸式阅读</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app-container">
    <!-- 顶部导航 -->
    <header class="header">
      <div class="header-inner">
        <div class="logo">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
            <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
            <line x1="8" y1="7" x2="16" y2="7"/>
            <line x1="8" y1="11" x2="14" y2="11"/>
          </svg>
        </div>
        <h1>装修资料库</h1>
        <span class="file-count" id="fileCount"></span>
      </div>
    </header>

    <!-- 搜索栏 -->
    <div class="search-bar">
      <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" id="searchInput" placeholder="搜索文件..." autocomplete="off">
    </div>

    <!-- 分类标签 -->
    <div class="filter-tabs" id="filterTabs">
      <button class="filter-tab active" data-type="all">全部</button>
      <button class="filter-tab" data-type="pdf">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M20 2H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-8.5 7.5c0 .83-.67 1.5-1.5 1.5H9v2H7.5V7H10c.83 0 1.5.67 1.5 1.5v1zm5 2c0 .83-.67 1.5-1.5 1.5h-1.5v2H13V7h1.5c.83 0 1.5.67 1.5 1.5v3zm4-3H19v1h1.5V11H19v2h-1.5V7h3v1.5zM9 9.5h1v-1H9v1zM4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm10 5.5h1v-3h-1v3z"/></svg>
        手册指南
      </button>
      <button class="filter-tab" data-type="xls">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M21.17 3.25c.52.52.83 1.24.83 2.01V18c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2h3.18L9 5.5h1.5l.65-1.5h1.7l.65 1.5H15l1.76-2.25H14V2h4.25l1.92 1.25zM6.5 12.5H8L9.5 8 11 12.5h1.5L14 8h-1.25l-.75 3.5L10.5 8H8.5L7 11.5 6.25 8H5l1.5 4.5zM16 8h-2v4.5h2c.83 0 1.5-.67 1.5-1.5v-1.5c0-.83-.67-1.5-1.5-1.5zm.5 3c0 .28-.22.5-.5.5h-.75V8.5H16c.28 0 .5.22.5.5v2z"/></svg>
        表格模板
      </button>
    </div>

    <!-- 文件列表 -->
    <main class="bookshelf" id="bookshelf">
      <!-- JS 动态填充 -->
    </main>

    <!-- 空状态 -->
    <div class="empty-state" id="emptyState" style="display:none">
      <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/>
        <polyline points="13 2 13 9 20 9"/>
      </svg>
      <p>没有找到匹配的文件</p>
    </div>
  </div>

  <!-- 底部提示 -->
  <div class="install-prompt" id="installPrompt" style="display:none">
    <span>添加到桌面，随时随地翻阅</span>
    <button id="installBtn">添加</button>
    <button id="dismissBtn" class="dismiss">&times;</button>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
